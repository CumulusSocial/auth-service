services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://auth:auth@postgres:5432/auth_db
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      JWT_KID: auth-key-1
      JWT_ISSUER: auth-service
      JWT_TTL_SECONDS: "900"
      SERVICE_CLIENTS: '{"feed-service":"local-dev-secret"}'
      LOG_LEVEL: INFO
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "8001:8001"

volumes:
  auth_pg:
